<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <rect width="256" height="130" rx="52" fill="url(#shine)"/>
  <!-- Pipeline / funnel shape -->
  <!-- Top bar (wide) -->
  <rect x="52" y="66" width="152" height="28" rx="14" fill="white" opacity="0.95"/>
  <!-- Middle bar -->
  <rect x="72" y="114" width="112" height="28" rx="14" fill="white" opacity="0.75"/>
  <!-- Bottom bar (narrow) -->
  <rect x="96" y="162" width="64" height="28" rx="14" fill="white" opacity="0.55"/>
  <!-- Dot at bottom of funnel -->
  <circle cx="128" cy="210" r="16" fill="white" opacity="0.9"/>
</svg>
